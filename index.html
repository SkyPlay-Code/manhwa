<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starlight Reader</title>
    <link rel="stylesheet" href="styles.css">
    
    <!-- Modern typography matrices -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <!-- High-speed PDFJS Core Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body class="dark-theme">

    <!-- Global Header Menu -->
    <header class="navbar">
        <div class="nav-container">
            <div class="logo-group" id="nav-logo">
                <div class="logo-icon"></div>
                <span class="logo-text">STARLIGHT</span>
            </div>
            <nav class="nav-links">
                <button class="nav-btn active" id="btn-home">Library</button>
                <button class="theme-toggle-btn" id="theme-toggle" aria-label="Toggle Theme">
                    <span class="theme-icon"></span>
                </button>
            </nav>
        </div>
    </header>

    <main class="main-content">
        
        <!-- View 1: Home Dashboard Library -->
        <section id="home-view" class="view">
            <!-- shelf for bookmarked/pinned manhwas -->
            <div id="favorites-section" class="dashboard-section hidden">
                <h3 class="section-title">Starred Releases</h3>
                <div class="manhwa-grid" id="favorites-grid"></div>
            </div>

            <div class="dashboard-section">
                <h3 class="section-title">All Series</h3>
                <div class="manhwa-grid" id="manhwa-grid"></div>
            </div>
        </section>

        <!-- View 2: Detailed Index View -->
        <section id="details-view" class="view hidden">
            <div class="back-nav">
                <button class="btn-back" id="details-back-btn">&larr; Back to Library</button>
            </div>
            <div class="detail-container">
                <div class="detail-header-block">
                    <div class="detail-cover-wrapper" id="detail-cover"></div>
                    <div class="detail-info">
                        <div class="detail-title-row">
                            <h2 id="detail-title">Series Name</h2>
                            <button id="detail-fav-btn" class="btn-star" style="font-size: 1.5rem;" title="Favorite">&#9734;</button>
                        </div>
                        <p class="detail-desc" id="detail-description"></p>
                        <button class="btn-primary" id="btn-continue-reading">
                            <span>Continue Reading</span>
                        </button>
                    </div>
                </div>

                <div class="chapter-table-wrapper">
                    <div class="chapter-table-header">Chapter Index</div>
                    <div class="chapter-list-rigid" id="chapter-grid"></div>
                </div>
            </div>
        </section>

        <!-- View 3: Advanced Reader View -->
        <section id="reader-view" class="view hidden">
            <!-- Reader sticky controls -->
            <div class="reader-controls">
                <div class="controls-left">
                    <button class="control-icon-btn" id="reader-back-btn" title="Exit to Details">&larr;</button>
                </div>
                
                <div class="controls-center">
                    <span class="reader-title-display" id="reader-title-display">Title</span>
                    <select id="reader-chapter-select" class="chapter-dropdown"></select>
                </div>

                <div class="controls-right">
                    <button class="control-icon-btn" id="btn-toggle-settings" title="Display Options">&#9881;</button>
                </div>
            </div>

            <!-- Settings Drawer Overlay inside reading view -->
            <div class="reader-settings-drawer hidden" id="reader-settings-drawer">
                <div class="setting-group">
                    <span class="setting-label">Reading Mode</span>
                    <div class="settings-btn-group" id="setting-mode">
                        <button class="settings-option active" data-value="scroll">Continuous</button>
                        <button class="settings-option" data-value="paged">Paged View</button>
                    </div>
                </div>

                <div class="setting-group">
                    <span class="setting-label">Visual Filter</span>
                    <div class="settings-btn-group" id="setting-filter">
                        <button class="settings-option active" data-value="default">Default</button>
                        <button class="settings-option" data-value="dimmed">Dimmed</button>
                        <button class="settings-option" data-value="sepia">Sepia</button>
                        <button class="settings-option" data-value="warm">Warm</button>
                        <button class="settings-option" data-value="invert">Night</button>
                    </div>
                </div>

                <div class="setting-group">
                    <span class="setting-label">Viewer Width</span>
                    <div class="settings-btn-group" id="setting-width">
                        <button class="settings-option" data-value="narrow">Narrow</button>
                        <button class="settings-option active" data-value="medium">Medium</button>
                        <button class="settings-option" data-value="wide">Wide</button>
                    </div>
                </div>

                <div class="setting-group">
                    <span class="setting-label">Strip Gap</span>
                    <div class="settings-btn-group" id="setting-gap">
                        <button class="settings-option active" data-value="none">None</button>
                        <button class="settings-option" data-value="small">Small</button>
                        <button class="settings-option" data-value="medium">Mid</button>
                        <button class="settings-option" data-value="large">Wide</button>
                    </div>
                </div>

                <div class="setting-group">
                    <span class="setting-label">Render Quality</span>
                    <div class="settings-btn-group" id="setting-quality">
                        <button class="settings-option" data-value="low">Low</button>
                        <button class="settings-option active" data-value="medium">Mid</button>
                        <button class="settings-option" data-value="high">High</button>
                    </div>
                </div>
            </div>

            <!-- The Scroll Canvas Container -->
            <div class="reader-scroll-container" id="reader-scroll-container">
                <div class="reader-render-area width-medium gap-none" id="reader-render-area"></div>
            </div>

            <!-- Floating page selector indicators for deep reading -->
            <div class="page-floating-nav" id="page-floating-nav">
                <span>Page</span>
                <select class="page-jump-select" id="page-jump-select"></select>
                <span id="page-floating-max">/ 0</span>
            </div>

            <!-- Global Footer arrows inside reading view -->
            <div class="reader-footer-nav" id="reader-footer-nav">
                <button class="nav-arrow-btn" id="prev-chap-btn">&larr; Previous Chapter</button>
                <button class="nav-arrow-btn" id="next-chap-btn">Next Chapter &rarr;</button>
            </div>
        </section>

    </main>

    <!-- Global Loading Overlay -->
    <div id="loading-overlay" class="loading-overlay hidden">
        <div class="spinner"></div>
        <p id="loading-text">Parsing repository...</p>
    </div>

    <!-- Core App Controller -->
    <script src="app.js"></script>
</body>
</html>
